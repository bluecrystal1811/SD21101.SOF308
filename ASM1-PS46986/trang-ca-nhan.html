<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang thông tin cá nhân</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container my-3 p-0 border bg-white">
        <nav class="navbar navbar-expand-lg navbar-light bg-warning-subtle border-bottom px-3">
            <a class="navbar-brand fw-bold text-danger" href="index.html"><i class="fa-solid fa-dragon"></i> Hiệp Khách Kim Dung</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="danh-sach-bai-viet.html">Bài viết</a></li>
                    <li class="nav-item"><a class="nav-link" href="tao-bai-viet.html">Đăng bài</a></li>
                    <li class="nav-item"><a class="nav-link" href="quan-ly-bai-viet.html">Quản lý bài</a></li>
                    <li class="nav-item"><a class="nav-link active" href="trang-ca-nhan.html">Trang cá nhân</a></li>
                </ul>
            </div>
        </nav>

        <div class="p-4">
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card">
                        <img src="../images/avatar.png" class="card-img-top" alt="Avatar">
                        <div class="card-body">
                            <h5 class="card-title mb-1">KiemKhachPS46986</h5>
                            <p class="text-muted mb-2">Thành viên từ 2026</p>
                            <span class="badge text-bg-danger">Fan Kim Dung</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-header bg-danger text-white">
                            <h4 class="mb-0"><i class="fa-solid fa-user-pen"></i> Cập nhật thông tin cá nhân</h4>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="fullName" class="form-label">Họ và tên</label>
                                        <input type="text" id="fullName" class="form-control" value="Đỗ Minh Khôi">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="nickName" class="form-label">Bút danh</label>
                                        <input type="text" id="nickName" class="form-control" value="KiemKhachPS46986">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" id="email" class="form-control" value="ps46986@fpt.edu.vn">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="avatar" class="form-label">Ảnh đại diện</label>
                                        <input type="file" id="avatar" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="newPassword" class="form-label">Mật khẩu mới</label>
                                        <input type="password" id="newPassword" class="form-control" placeholder="********">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                                        <input type="password" id="confirmPassword" class="form-control" placeholder="********">
                                    </div>
                                </div>
                                <div class="mt-3 d-flex gap-2 justify-content-end">
                                    <button type="reset" class="btn btn-outline-secondary">Làm mới</button>
                                    <button type="submit" class="btn btn-danger">Lưu thay đổi</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="bg-dark text-white text-center py-3">
            Hồ sơ cá nhân của thành viên cộng đồng hiệp khách
        </footer>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
</body>
</html>
