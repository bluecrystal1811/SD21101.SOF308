<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 4</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <div class="container mt-3">
        <h3>Bài tập ứng dụng Modal cho Tài khoản</h3>

        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
            Tài khoản
        </button>
    </div>

    <!-- The Modal -->
    <div class="modal" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">ĐĂNG NHẬP/ ĐĂNG KÝ</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <!-- Nav tabs -->
                    <ul class="nav nav-tabs" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" data-bs-toggle="tab" href="#register">Đăng ký</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#login">Đăng nhập</a>
                        </li>
                    </ul>

                    <!-- Tab panes -->
                    <div class="tab-content">
                        <div id="register" class="container tab-pane active"><br>
                            <div class="container">
                                <h4 class="mb-3">Form Đăng Ký Thông Tin</h4>
                                <form>
                                    <div class="mb-2">
                                        <label for="fullname" class="form-label">Họ và Tên</label>
                                        <input type="text" class="form-control" id="fullname"
                                            placeholder="Nhập họ và tên">
                                    </div>

                                    <div class="mb-2">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" placeholder="Nhập email">
                                    </div>

                                    <div class="mb-2">
                                        <label for="phone" class="form-label">Số Điện Thoại</label>
                                        <input type="tel" class="form-control" id="phone"
                                            placeholder="Nhập số điện thoại">
                                    </div>

                                    <div class="mb-2">
                                        <label for="password" class="form-label">Mật Khẩu</label>
                                        <input type="password" class="form-control" id="password"
                                            placeholder="Nhập mật khẩu">
                                    </div>

                                    <div class="mb-2">
                                        <label for="confirm-password" class="form-label">Xác Nhận Mật Khẩu</label>
                                        <input type="password" class="form-control" id="confirm-password"
                                            placeholder="Xác nhận mật khẩu">
                                    </div>

                                    <div class="mb-2">
                                        <label class="form-label">Giới Tính:</label>
                                        <div>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="radio" name="gender" id="male"
                                                    value="Nam">
                                                <label class="form-check-label" for="male">Nam</label>
                                            </div>
                                            <div class="form-check form-check-inline">
                                                <input class="form-check-input" type="radio" name="gender" id="female"
                                                    value="Nữ">
                                                <label class="form-check-label" for="female">Nữ</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-2">
                                        <label for="language" class="form-label">Ngôn Ngữ</label>
                                        <select class="form-select" id="language">
                                            <option selected>Tiếng Việt</option>
                                            <option>English</option>
                                        </select>
                                    </div>

                                    <div class="mb-2 form-check">
                                        <input type="checkbox" class="form-check-input" id="agree">
                                        <label class="form-check-label" for="agree">
                                            Tôi đồng ý với các điều khoản và điều kiện
                                        </label>
                                    </div>

                                    <button type="submit" class="btn btn-primary">Đăng Ký</button>
                                </form>
                            </div>
                        </div>

                        <div id="login" class="container tab-pane fade"><br>
                            <div class="container">
                                <h4 class="mb-4">Form Đăng nhập</h4>
                                <form>
                                    <div class="mb-3">
                                        <label for="login-email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="login-email"
                                            placeholder="Nhập email">
                                    </div>

                                    <div class="mb-3">
                                        <label for="login-password" class="form-label">Mật Khẩu</label>
                                        <input type="password" class="form-control" id="login-password"
                                            placeholder="Nhập mật khẩu">
                                    </div>

                                    <button type="submit" class="btn btn-primary">Đăng Nhập</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
</body>

</html>
