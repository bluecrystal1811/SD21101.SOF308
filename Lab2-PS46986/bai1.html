<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <div class="bg-light" style="max-width: 760px; margin: 20px auto; border: 1px solid #cfcfcf; padding: 8px;">
        <h1 class="text-danger text-center fw-bold" style="margin: 4px 0 12px;">Bảng Thành Phần Dinh Dưỡng</h1>

        <table class="table table-bordered" style="margin-bottom: 0; background: #fff;">
            <thead>
                <tr>
                    <th rowspan="2" class="bg-warning text-center align-middle col-6">Thành Phần</th>
                    <th colspan="2" class="bg-warning text-center align-middle col-6">Giá Trị</th>
                </tr>
                <tr>
                    <th class="bg-warning">Khối Lượng</th>
                    <th class="bg-warning">% DV*</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Calories</td>
                    <td>200 kcal</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Chất Béo</td>
                    <td>9 g</td>
                    <td>14%</td>
                </tr>
                <tr>
                    <td>Chất Béo Bão Hòa</td>
                    <td>4 g</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Chất Đạm</td>
                    <td>8 g</td>
                    <td>16%</td>
                </tr>
                <tr>
                    <td>Chất Xơ</td>
                    <td>5 g</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Đường</td>
                    <td>12 g</td>
                    <td>-</td>
                </tr>
                <tr>
                    <td rowspan="2" class="align-middle">Vitamin</td>
                    <td>Vitamin C</td>
                    <td>25%</td>
                </tr>
                <tr>
                    <td>Vitamin D</td>
                    <td>10%</td>
                </tr>
            </tbody>
        </table>
    </div>


</body>

</html>
